kind = "web"
previewPath = "/"
title = "Medical Report Analyzer"
version = "1.0.0"
id = "artifacts/medical-report-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20279

[services.development]
run = "pnpm --filter @workspace/medical-report-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medical-report-analyzer", "run", "build" ]
publicDir = "artifacts/medical-report-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20279"
BASE_PATH = "/"
